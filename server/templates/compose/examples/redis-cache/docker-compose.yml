services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: podorel-compose-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
