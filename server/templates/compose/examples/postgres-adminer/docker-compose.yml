services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: podorel-compose-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-podorel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-podorel-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-podorel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: docker.io/library/adminer:4
    container_name: podorel-compose-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8086}:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
