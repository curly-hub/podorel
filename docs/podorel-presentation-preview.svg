<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">PoDorel product flow preview</title>
  <desc id="desc">A GitHub README preview showing PoDorel as a local-first rootless Podman operations console.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#e6eeec"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1">
      <stop offset="0" stop-color="#006d75"/>
      <stop offset="1" stop-color="#b85f1a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#10221f" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="8" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="54" y="42" width="1092" height="276" rx="8" fill="#ffffff" stroke="#d3e0dc"/>
    <rect x="54" y="42" width="1092" height="48" rx="8" fill="#f7fbf9"/>
    <circle cx="82" cy="66" r="6" fill="#b3261e"/>
    <circle cx="102" cy="66" r="6" fill="#8a5a00"/>
    <circle cx="122" cy="66" r="6" fill="#157347"/>
    <rect x="152" y="55" width="360" height="22" rx="11" fill="#ffffff" stroke="#d3e0dc"/>
    <text x="170" y="70" fill="#6b7d78" font-family="Arial, sans-serif" font-size="12" font-weight="700">https://podorel.local/dashboard</text>
  </g>
  <g>
    <text x="86" y="136" fill="#006d75" font-family="Arial, sans-serif" font-size="12" font-weight="900">ROOTLESS PODMAN OPERATIONS</text>
    <text x="86" y="176" fill="#10221f" font-family="Arial, sans-serif" font-size="34" font-weight="900">Run local containers with clear state.</text>
    <text x="86" y="206" fill="#415a54" font-family="Arial, sans-serif" font-size="17" font-weight="500">Pods, logs, templates, Compose, agents, scans, audit, and diagnostics in one practical console.</text>
  </g>
  <g>
    <rect x="86" y="236" width="150" height="42" rx="21" fill="#d9f2f1" stroke="#a9d6d3"/>
    <text x="113" y="263" fill="#064f55" font-family="Arial, sans-serif" font-size="14" font-weight="900">Local-first</text>
    <rect x="250" y="236" width="150" height="42" rx="21" fill="#fff0e3" stroke="#edc5a1"/>
    <text x="278" y="263" fill="#8d4612" font-family="Arial, sans-serif" font-size="14" font-weight="900">Agent-based</text>
    <rect x="414" y="236" width="150" height="42" rx="21" fill="#e0f4ea" stroke="#afdcc4"/>
    <text x="448" y="263" fill="#157347" font-family="Arial, sans-serif" font-size="14" font-weight="900">Audit-ready</text>
  </g>
  <g>
    <rect x="650" y="118" width="210" height="76" rx="8" fill="#f7fbf9" stroke="#d3e0dc"/>
    <text x="672" y="148" fill="#6b7d78" font-family="Arial, sans-serif" font-size="12" font-weight="900">PODS</text>
    <text x="672" y="178" fill="#10221f" font-family="Arial, sans-serif" font-size="30" font-weight="900">12</text>
    <rect x="884" y="118" width="210" height="76" rx="8" fill="#f7fbf9" stroke="#d3e0dc"/>
    <text x="906" y="148" fill="#6b7d78" font-family="Arial, sans-serif" font-size="12" font-weight="900">AGENTS</text>
    <text x="906" y="178" fill="#10221f" font-family="Arial, sans-serif" font-size="30" font-weight="900">2/2</text>
    <rect x="650" y="212" width="210" height="76" rx="8" fill="#f7fbf9" stroke="#d3e0dc"/>
    <text x="672" y="242" fill="#6b7d78" font-family="Arial, sans-serif" font-size="12" font-weight="900">SECURITY</text>
    <text x="672" y="272" fill="#157347" font-family="Arial, sans-serif" font-size="30" font-weight="900">ready</text>
    <rect x="884" y="212" width="210" height="76" rx="8" fill="#f7fbf9" stroke="#d3e0dc"/>
    <text x="906" y="242" fill="#6b7d78" font-family="Arial, sans-serif" font-size="12" font-weight="900">MEMORY</text>
    <text x="906" y="272" fill="#10221f" font-family="Arial, sans-serif" font-size="30" font-weight="900">3.8 GiB</text>
  </g>
  <rect x="54" y="42" width="1092" height="5" fill="url(#brand)"/>
</svg>
