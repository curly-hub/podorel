<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">PoDorel product presentation banner</title>
  <desc id="desc">A polished product banner for PoDorel showing a local-first rootless Podman operations flow.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdfc"/>
      <stop offset=".55" stop-color="#eef5f2"/>
      <stop offset="1" stop-color="#e4eeeb"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#006d75"/>
      <stop offset=".55" stop-color="#157347"/>
      <stop offset="1" stop-color="#b85f1a"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10221f" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="18" fill="url(#page)"/>
  <rect x="34" y="34" width="1212" height="452" rx="18" fill="#ffffff" stroke="#d3e0dc" filter="url(#softShadow)"/>
  <rect x="34" y="34" width="1212" height="8" rx="4" fill="url(#brand)"/>

  <g transform="translate(86 86)">
    <circle cx="38" cy="38" r="38" fill="#d9f2f1" stroke="#9dcfcb"/>
    <path d="M28 25h21c8 0 14 6 14 14s-6 14-14 14H34v13H28V25zm6 6v16h15c5 0 8-3 8-8s-3-8-8-8H34z" fill="#064f55"/>
    <text x="96" y="32" fill="#006d75" font-family="Arial, sans-serif" font-size="14" font-weight="900">LOCAL-FIRST ROOTLESS PODMAN</text>
    <text x="96" y="76" fill="#10221f" font-family="Arial, sans-serif" font-size="44" font-weight="900">PoDorel makes local containers feel organized.</text>
    <text x="96" y="112" fill="#415a54" font-family="Arial, sans-serif" font-size="19" font-weight="500">Operate pods, logs, Compose stacks, agents, scans, audit trails, and diagnostics from one focused console.</text>
  </g>

  <g transform="translate(106 250)">
    <rect x="0" y="0" width="210" height="112" rx="10" fill="#f7fbf9" stroke="#d3e0dc"/>
    <circle cx="34" cy="34" r="18" fill="#d9f2f1"/>
    <text x="27" y="41" fill="#064f55" font-family="Arial, sans-serif" font-size="18" font-weight="900">1</text>
    <text x="24" y="74" fill="#10221f" font-family="Arial, sans-serif" font-size="19" font-weight="900">Observe</text>
    <text x="24" y="96" fill="#6b7d78" font-family="Arial, sans-serif" font-size="13" font-weight="700">Pods, agents, logs, stats</text>

    <rect x="244" y="0" width="210" height="112" rx="10" fill="#f7fbf9" stroke="#d3e0dc"/>
    <circle cx="278" cy="34" r="18" fill="#fff0e3"/>
    <text x="271" y="41" fill="#8d4612" font-family="Arial, sans-serif" font-size="18" font-weight="900">2</text>
    <text x="268" y="74" fill="#10221f" font-family="Arial, sans-serif" font-size="19" font-weight="900">Act</text>
    <text x="268" y="96" fill="#6b7d78" font-family="Arial, sans-serif" font-size="13" font-weight="700">Lifecycle, templates, Compose</text>

    <rect x="488" y="0" width="210" height="112" rx="10" fill="#f7fbf9" stroke="#d3e0dc"/>
    <circle cx="522" cy="34" r="18" fill="#e0f4ea"/>
    <text x="515" y="41" fill="#157347" font-family="Arial, sans-serif" font-size="18" font-weight="900">3</text>
    <text x="512" y="74" fill="#10221f" font-family="Arial, sans-serif" font-size="19" font-weight="900">Trust</text>
    <text x="512" y="96" fill="#6b7d78" font-family="Arial, sans-serif" font-size="13" font-weight="700">HTTPS, passkeys, audit</text>
  </g>

  <g transform="translate(858 150)">
    <rect x="0" y="0" width="278" height="44" rx="22" fill="#d9f2f1" stroke="#9dcfcb"/>
    <text x="28" y="28" fill="#064f55" font-family="Arial, sans-serif" font-size="15" font-weight="900">No cluster required</text>
    <rect x="0" y="64" width="278" height="44" rx="22" fill="#fff0e3" stroke="#edc5a1"/>
    <text x="28" y="92" fill="#8d4612" font-family="Arial, sans-serif" font-size="15" font-weight="900">Works with Linux users</text>
    <rect x="0" y="128" width="278" height="44" rx="22" fill="#e0f4ea" stroke="#afdcc4"/>
    <text x="28" y="156" fill="#157347" font-family="Arial, sans-serif" font-size="15" font-weight="900">Built for daily operations</text>
    <rect x="0" y="192" width="278" height="44" rx="22" fill="#f7fbf9" stroke="#d3e0dc"/>
    <text x="28" y="220" fill="#415a54" font-family="Arial, sans-serif" font-size="15" font-weight="900">Small-team friendly</text>
  </g>

  <path d="M807 306 C826 292, 835 282, 850 270" fill="none" stroke="#a9beb8" stroke-width="3" stroke-linecap="round"/>
  <path d="M848 270 l-16 -2 l8 14 z" fill="#a9beb8"/>
</svg>
